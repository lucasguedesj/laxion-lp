<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulário - Laxion</title>
</head>
<body>
  <form name="contato" method="POST" action="/form.html" data-netlify="true" netlify-honeypot="bot-field">
    <p class="hidden">
      <label>Não preencha: <input name="bot-field" /></label>
    </p>
    <p>
      <label>Nome: <input type="text" name="nome" /></label>
    </p>
    <p>
      <label>Email: <input type="email" name="email" /></label>
    </p>
    <p>
      <label>WhatsApp: <input type="tel" name="whatsapp" /></label>
    </p>
    <p>
      <label>Objetivo: <select name="objetivo">
        <option>Vender mais online</option>
        <option>Automatizar atendimento</option>
        <option>Melhorar posicionamento (SEO)</option>
        <option>Escalar anúncios (Tráfego)</option>
        <option>Outro</option>
      </select></label>
    </p>
    <p>
      <button type="submit">Enviar</button>
    </p>
  </form>
  <script>window.location.href = '/';</script>
</body>
</html>
